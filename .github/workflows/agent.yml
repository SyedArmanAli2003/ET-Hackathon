name: Civic AQI Alert Agent

on:
  # Ingestion starts at :17 every five hours. This runs roughly two hours later
  # so the latest readings and forecasts are available to the agent.
  schedule:
    - cron: "30 2,7,12,17,22 * * *"
  workflow_dispatch:

concurrency:
  group: civic-aqi-alert-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the deployed Civic AQI Alert Agent
        env:
          AGENT_RUN_URL: ${{ secrets.AGENT_RUN_URL }}
          AGENT_RUN_TOKEN: ${{ secrets.AGENT_RUN_TOKEN }}
        run: |
          if [ -z "$AGENT_RUN_URL" ] || [ -z "$AGENT_RUN_TOKEN" ]; then
            echo "AGENT_RUN_URL and AGENT_RUN_TOKEN repository secrets are required."
            exit 1
          fi

          curl --fail-with-body --retry 2 --retry-delay 5 \
            --request POST "$AGENT_RUN_URL" \
            --header "Content-Type: application/json" \
            --header "x-agent-run-token: $AGENT_RUN_TOKEN" \
            --data '{"trigger":"scheduled"}'
